<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Poll-tex Fb、ig 廣告素材中心</title>
    <link rel="stylesheet" href="styles.css?v=20" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand-block brand-block--link" href="index.html" aria-label="返回功能儀表板">
          <img class="brand-logo" src="assets/polltex-logo.png" alt="Poll-tex 普特絲防霾紗窗" />
          <div>
            <p class="brand-title">Poll-tex 南桃園展示中心</p>
            <h1>Fb、ig廣告素材中心</h1>
          </div>
        </a>

        <nav class="quick-links" aria-label="功能連結">
          <a class="quick-link quick-link--line" href="https://lin.ee/WaqjlRa" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 19.2V16a7 7 0 1 1 3.1 2.4L5 19.2Z" />
              <path d="M8.5 11.2h.01M12 11.2h.01M15.5 11.2h.01" />
            </svg>
            LINE官方
          </a>
          <a class="quick-link" href="index.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-8.5Z" />
            </svg>
            儀表板
          </a>
          <a class="quick-link" href="quote.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
              <path d="M8 7h8M8 11h2M12 11h4M8 15h2M12 15h4" />
            </svg>
            價格計算
          </a>
          <a class="quick-link" href="training.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H20v15H6.5A2.5 2.5 0 0 0 4 21.5v-15Z" />
              <path d="M8 8h8M8 12h7M8 16h5" />
            </svg>
            教育訓練
          </a>
          <a class="quick-link quick-link--icon" href="https://drive.google.com/drive/folders/1jVhw9jCTyAgVBqt5EEuxBNboC5yIZ0II?usp=drive_link" target="_blank" rel="noopener noreferrer" aria-label="開啟雲端素材資料夾" title="雲端素材">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17.5 18H8a4 4 0 0 1-.8-7.92A5.5 5.5 0 0 1 17.7 8.7 4.7 4.7 0 0 1 17.5 18Z" />
            </svg>
          </a>
        </nav>

        <form class="agent-form" id="agentForm" autocomplete="on">
          <label class="field">
            <span>業務姓名</span>
            <input id="agentName" name="agentName" type="text" placeholder="例：王小明" />
          </label>
          <label class="field">
            <span>專員電話</span>
            <input id="agentPhone" name="agentPhone" type="tel" placeholder="例：0912-345-678" />
          </label>
          <label class="field">
            <span>LINE ID</span>
            <input id="agentLine" name="agentLine" type="text" placeholder="例：@polltex" />
          </label>
        </form>
      </div>
    </header>

    <main class="page-shell">
      <section class="status-strip" aria-label="素材狀態">
        <div>
          <strong id="profileStatus">尚未填寫業務資料</strong>
          <span>填入後會同步更新下方每一則廣告文案。</span>
        </div>
        <button class="soft-button" id="clearProfile" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3" />
          </svg>
          清除資料
        </button>
      </section>

      <section class="asset-tools" aria-label="素材搜尋與篩選">
        <label class="search-box">
          <span>搜尋素材</span>
          <input id="assetSearch" type="search" placeholder="輸入親子、長輩、通風、小黑蚊、空污..." autocomplete="off" />
        </label>
        <div class="filter-panel">
          <div class="filter-tabs" aria-label="情境篩選">
            <button class="filter-tab is-active" type="button" data-filter="all">全部</button>
            <button class="filter-tab" type="button" data-filter="family">親子</button>
            <button class="filter-tab" type="button" data-filter="senior">長輩</button>
            <button class="filter-tab" type="button" data-filter="pet">寵物</button>
            <button class="filter-tab" type="button" data-filter="breeze">通風</button>
            <button class="filter-tab" type="button" data-filter="mosquito">防蚊</button>
            <button class="filter-tab" type="button" data-filter="air">空污</button>
          </div>
          <p class="asset-count" id="assetCount">共 10 張素材</p>
        </div>
      </section>

      <section class="ad-grid" id="adGrid" aria-label="廣告素材清單"></section>
      <div class="empty-state" id="emptyState" hidden>
        <strong>找不到符合的素材</strong>
        <span>換個關鍵字，或切回「全部」查看完整素材。</span>
      </div>
    </main>

    <footer class="site-footer">
      <p>普特絲防霾紗窗 南桃園展示中心 蔡濬瑒店長製</p>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <button class="back-top" id="backTop" type="button" aria-label="回到頁面上方" hidden>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 19V5M6 11l6-6 6 6" />
      </svg>
    </button>

    <div class="image-lightbox" id="imageLightbox" hidden>
      <button class="image-lightbox__close" id="closeLightbox" type="button" aria-label="關閉圖片預覽">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18" />
        </svg>
      </button>
      <div class="image-lightbox__stage">
        <img id="lightboxImage" alt="" />
      </div>
      <p class="image-lightbox__caption" id="lightboxCaption"></p>
    </div>

    <script src="script.js?v=20"></script>
  </body>
</html>
